<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Processor</title>
<style>

:root{--bg:#fff;--bg2:#f8f7f5;--bg3:#f1efe8;--t1:#1a1918;--t2:#4a4845;--t3:#888780;--b1:rgba(26,25,24,.40);--b2:rgba(26,25,24,.22);--b3:rgba(26,25,24,.11);--err-bg:#fef2f2;--err-t:#991b1b;--err-b:#fecaca;--r:8px;--f:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1a1918;--bg2:#242320;--bg3:#2e2c28;--t1:#f0ede8;--t2:#b8b4ae;--t3:#6b6865;--b1:rgba(240,237,232,.40);--b2:rgba(240,237,232,.22);--b3:rgba(240,237,232,.11);--err-bg:#2d1515;--err-t:#fca5a5;--err-b:rgba(127,29,29,.5)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--t1);line-height:1.5}
.app{max-width:760px;margin:0 auto;padding:40px 28px 80px}
.hdr-meta{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:10px}
h1{font-size:22px;font-weight:500;margin-bottom:16px}
.hyp-panel{border:1px solid var(--b3);border-radius:var(--r);overflow:hidden;margin-bottom:32px}
.hyp-toggle{width:100%;padding:10px 14px;background:none;border:none;cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:space-between;gap:12px}
.hyp-toggle-l{display:flex;align-items:center;gap:10px}
.hyp-content{border-top:1px solid var(--b3);padding:12px 14px;display:flex;flex-direction:column;gap:6px;background:var(--bg2)}
.hyp-card{border:1px solid var(--b3);border-radius:5px;overflow:hidden}
.hyp-card-hdr{width:100%;padding:10px 12px;background:none;border:none;cursor:pointer;font-family:var(--f);display:flex;align-items:flex-start;gap:10px;text-align:left}
.hyp-card-body{flex:1}
.hyp-card-name{font-size:11px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hyp-card-sum{font-size:11px;line-height:1.6;color:var(--t3)}
.hyp-card-det{padding:0 12px 12px;border-top:1px solid var(--b3);background:var(--bg2)}
.hyp-card-det ul{margin:10px 0 0;padding-left:16px;display:flex;flex-direction:column;gap:5px}
.hyp-card-det li{font-size:11px;line-height:1.65;color:var(--t2)}
.input-section{margin-bottom:24px}
.input-lbl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:10px}
textarea{width:100%;padding:16px;font-size:15px;line-height:1.75;color:var(--t1);background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);resize:vertical;outline:none;font-family:var(--f);display:block}
textarea:focus{border-color:var(--b1)}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.word-count{font-size:12px;color:var(--t3)}
.analyze-btn{padding:10px 22px;font-size:13px;font-weight:500;color:#fff;background:#231F20;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:8px}
.analyze-btn:disabled{background:var(--b2);cursor:not-allowed}
.spinner{width:13px;height:13px;border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{padding:13px 16px;border-radius:var(--r);border:1px solid var(--err-b);background:var(--err-bg);color:var(--err-t);font-size:13px;margin-bottom:24px}
.divider{height:1px;background:var(--b3);margin:36px 0}
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-label span{font-weight:400;text-transform:none;letter-spacing:0}
.mb28{margin-bottom:28px}.mb36{margin-bottom:36px}
.card{padding:14px 16px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg2)}
.lang-meta{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.lang-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--t2);border:1px solid var(--b2);letter-spacing:.04em}
.meta-counts{font-size:12px;color:var(--t3)}
.narrative-card{padding:16px 18px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg2);font-size:15px;line-height:1.75;color:var(--t1)}
.frame-card{padding:14px 16px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg2);display:flex;flex-wrap:wrap;gap:16px 32px}
.frame-item-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:6px}
.frame-item-val{font-size:13px;color:var(--t1)}
.events-list{display:flex;flex-direction:column;gap:10px}
.event-card{border:1px solid var(--b2);border-radius:var(--r);overflow:hidden}
.event-hdr{padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--b3);display:flex;align-items:center;gap:10px}
.event-num{width:20px;height:20px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--t3);flex-shrink:0}
.event-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.event-desc{font-size:14px;font-weight:500;color:var(--t1);flex:1}
.event-loc{font-size:11px;color:var(--t3)}
.event-parts{padding:0 14px}
.part-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b3)}
.part-row:last-child{border-bottom:none}
.role-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.part-ref{font-size:13px;flex:1;display:flex;align-items:center;gap:6px}
.narrator-tag{font-size:10px;color:var(--t3);font-weight:400}
.purpose-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.purpose-dot{width:8px;height:8px;border-radius:50%;background:var(--b2);flex-shrink:0}
.purpose-lbl{font-size:12px;color:var(--t3);flex:1}
.sem-summary{font-size:13px;line-height:1.65;color:var(--t2);margin-bottom:12px}
.must-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:8px}
.must-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.must-item{display:flex;align-items:flex-start;gap:8px}
.must-dot{width:5px;height:5px;border-radius:50%;background:var(--b1);flex-shrink:0;margin-top:7px}
.must-text{font-size:12px;line-height:1.6;color:var(--t2)}
.uniq-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:8px}
.uniq-text{font-size:13px;line-height:1.65;color:var(--t2)}
.sel-strip{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:14px}
.strip-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.filter-tabs{display:flex;gap:4px;margin-bottom:14px}
.filter-tab{padding:4px 12px;border-radius:4px;font-size:11px;border:1px solid var(--b3);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--f)}
.filter-tab.active{border-color:var(--b1);background:var(--bg2);color:var(--t1);font-weight:500}
.trace-rows{display:flex;flex-direction:column;gap:5px}
.trace-row{border:1px solid var(--b3);border-radius:6px;overflow:hidden}
.trace-hdr{width:100%;padding:11px 14px;background:none;border:none;cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:10px;text-align:left}
.trace-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.trace-name{font-size:13px;font-weight:500;color:var(--t1);flex:1}
.trace-det{padding:12px 14px 14px;border-top:1px solid var(--b3);display:flex;flex-direction:column;gap:10px;background:var(--bg2)}
.field-row{display:grid;grid-template-columns:138px 1fr;gap:10px;align-items:baseline}
.field-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);line-height:1.65}
.field-lbl.hl{color:var(--t2)}
.field-val{font-size:13px;line-height:1.65;color:var(--t2)}
.trace-ref{padding-top:8px;border-top:1px dashed var(--b3);font-size:10px;color:var(--t3);font-family:monospace}
.units-list{display:flex;flex-direction:column;gap:8px}
.unit-card{padding:14px 18px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg2);display:flex;gap:14px;align-items:center}
.unit-num{width:24px;height:24px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--t3);flex-shrink:0}
.unit-body{flex:1}
.unit-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.unit-name{font-size:14px;font-weight:500;color:var(--t1)}
.unit-src{font-size:12px;color:var(--t3)}
.badge{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:500;white-space:nowrap;display:inline-block}
.id-badge{font-size:9px;font-weight:700;letter-spacing:.05em;color:#231F20;background:#F1EFE8;border:1px solid #D3D1C7;border-radius:3px;padding:2px 6px;white-space:nowrap;flex-shrink:0}
.count-badge{padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;background:var(--bg2);color:var(--t2);border:1px solid var(--b2)}
.chevron{display:inline-block;font-size:11px;color:var(--t3);transition:transform .15s;flex-shrink:0;line-height:1}
.chevron.open{transform:rotate(180deg)}
/* VRP */
.vrp-trigger-zone{margin-top:36px;padding-top:32px;border-top:1px solid var(--b3)}
.generate-vrp-btn{padding:10px 22px;font-size:13px;font-weight:500;color:#fff;background:#231F20;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:8px}
.generate-vrp-btn:disabled{background:var(--b2);cursor:not-allowed}
.vrp-loading{display:flex;align-items:center;gap:12px;padding:20px 0}
.vrp-loading-txt{font-size:13px;color:var(--t2)}
.vrp-dark-spinner{width:13px;height:13px;border:1.5px solid var(--b2);border-top-color:var(--t2);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
.vrp-summary-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.vrp-chip{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid}
.vrp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.vrp-ensemble{margin-bottom:20px}
.vrp-ensemble-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:8px}
.vrp-ensemble-text{font-size:13px;line-height:1.65;color:var(--t2)}
.vrp-cards{display:flex;flex-direction:column;gap:6px}
.vrp-card{border:1px solid var(--b2);border-radius:var(--r);overflow:hidden}
.vrp-card-hdr{width:100%;padding:11px 14px;background:none;border:none;cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:10px;text-align:left}
.vrp-card-name{font-size:13px;font-weight:500;color:var(--t1);flex:1}
.vrp-card-body{border-top:1px solid var(--b3)}
.vrp-phase{padding:12px 16px;border-bottom:1px solid var(--b3)}
.vrp-phase:last-child{border-bottom:none}
.vrp-phase-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:10px}
/* Phase 2 steps */
.vrp-step{border:1px solid var(--b3);border-radius:5px;margin-bottom:6px;overflow:hidden}
.vrp-step:last-child{margin-bottom:0}
.vrp-step-hdr{padding:5px 11px;background:var(--bg2);border-bottom:1px solid var(--b3)}
.vrp-step-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3)}
.vrp-step-body{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.poss-row{display:flex;align-items:flex-start;gap:9px}
.poss-icon{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px;line-height:1}
.poss-yes{background:#E1F5EE;border:1px solid #5DCAA5;color:#04342C}
.poss-no{background:#F1EFE8;border:1px solid #B4B2A9;color:#6B6865}
.poss-label{font-size:11px;font-weight:600;color:var(--t1);margin-bottom:2px}
.poss-rationale{font-size:12px;color:var(--t2);line-height:1.55}
.poss-body{flex:1}
.testv-na{font-size:12px;color:var(--t3);font-style:italic}
.testv-alt-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:4px}
.testv-alt{padding:8px 10px;background:var(--bg);border:1px dashed var(--b2);border-radius:4px;font-size:12px;color:var(--t2);line-height:1.55}
.testv-conclusion{display:flex;align-items:center;gap:8px;margin-top:4px}
.mode-decision-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.vrp-mode-box{padding:10px 12px;border-radius:5px;border:1px solid;display:flex;flex-direction:column;gap:6px}
.vrp-mode-box-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:1px}
.dep-units{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.dep-chip{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--bg);border:1px solid var(--b2);color:var(--t2);font-family:monospace}
.surv-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.conf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conf-table{display:flex;flex-direction:column;gap:5px;margin-bottom:5px}
.conf-row{display:flex;align-items:center;gap:8px}
.conf-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);width:130px;flex-shrink:0}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:4px;margin-top:2px}
.feat-item{display:flex;align-items:flex-start;gap:7px}
.viability-banner{margin-top:16px;padding:12px 16px;border-radius:var(--r);border:1px solid;border-left-width:3px}
.viability-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.viability-txt{font-size:13px;line-height:1.6}
/* Consistency gate */
.gate-card{padding:14px 16px;border-radius:var(--r);border:1px solid;border-left-width:3px;margin-bottom:28px}
.gate-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.gate-status-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.gate-note{font-size:12px;line-height:1.6;margin-top:8px}
.compliance-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.compliance-row{display:flex;align-items:flex-start;gap:9px}
.compliance-icon{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;margin-top:2px;line-height:1}
.compliance-pass{background:#E1F5EE;border:1px solid #5DCAA5;color:#04342C}
.compliance-fail{background:#FAECE7;border:1px solid #F0997B;color:#4A1B0C}
.compliance-body{flex:1}
.compliance-req{font-size:12px;line-height:1.55;color:var(--t2)}
.compliance-units{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.compliance-violation{font-size:11px;margin-top:4px;color:#D85A30;line-height:1.5}
.gate-warn{font-size:12px;color:#D85A30;margin-bottom:12px;line-height:1.55}
/* ARA */
.ara-context{margin-bottom:16px;padding:13px 16px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg2)}
.ara-base-seq{font-family:monospace;font-size:11px;padding:6px 9px;background:var(--bg);border:1px solid var(--b3);border-radius:4px;line-height:1.55;color:var(--t1);margin:6px 0}
.ara-card{border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;margin-bottom:6px}
.ara-card-hdr{width:100%;padding:11px 14px;background:none;border:none;cursor:pointer;font-family:var(--f);display:flex;align-items:center;gap:10px;text-align:left}
.ara-card-body{border-top:1px solid var(--b3)}
.ara-strategy-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b3)}
@media(max-width:540px){.ara-strategy-grid{grid-template-columns:1fr}}
.ara-strategy-col{padding:12px 14px;border-right:1px solid var(--b3);display:flex;flex-direction:column;gap:6px}
.ara-strategy-col:last-child{border-right:none}
.ara-strategy-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:4px}
.ara-seq{font-family:monospace;font-size:11px;padding:6px 9px;background:var(--bg);border:1px solid var(--b3);border-radius:4px;line-height:1.55;color:var(--t1)}
.ara-pres-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px}
.ara-pres-note{font-size:11px;color:var(--t3);line-height:1.5;margin-top:3px}
.ara-finding{padding:12px 14px;background:var(--bg2)}
.ara-finding-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:6px}
.ara-finding-text{font-size:12px;line-height:1.6;color:var(--t2)}
.ara-seq-finding{padding:14px 16px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg2);margin-top:14px}
.ara-open-q{margin-top:14px;padding:13px 16px;border-radius:var(--r);border:1px solid var(--b2)}
.ara-open-q-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:8px}
.ara-q-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--b3)}
.ara-q-item:last-child{border-bottom:none}
.ara-q-dot{width:5px;height:5px;border-radius:50%;background:var(--b1);flex-shrink:0;margin-top:7px}
.ara-q-text{font-size:12px;line-height:1.6;color:var(--t2)}
.h002-flag{font-size:11px;color:#412402;line-height:1.5;margin-top:2px}
.sf-list{display:flex;flex-direction:column;gap:5px}
.sf-row{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:5px;border:1px solid var(--b3);background:var(--bg2);flex-wrap:wrap}
.sf-field{font-size:13px;font-weight:500;color:var(--t1);flex:1;min-width:120px}
.sf-desc{font-size:12px;color:var(--t3);line-height:1.5;flex:2}
.crit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.crit-row{display:flex;align-items:flex-start;gap:8px}
.crit-lbl-col{width:140px;flex-shrink:0;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);line-height:1.65;padding-top:3px}
.crit-content{flex:1;display:flex;flex-direction:column;gap:3px}
.crit-reason{font-size:12px;color:var(--t2);line-height:1.55}
.id-gate-row{padding:8px 10px;border-radius:5px;border:1px solid;margin-bottom:8px}
.id-gate-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;margin-bottom:4px}
.id-gate-reason{font-size:12px;line-height:1.55}


/* ── Catalog / Library additions ── */
.cat-hit{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);border:1px solid #5DCAA5;background:#E1F5EE;margin-bottom:6px}
.cat-miss{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);border:1px solid #F0997B;background:#FAECE7;margin-bottom:6px;border-left-width:3px}
.cat-svg-wrap{width:56px;height:56px;flex-shrink:0;background:#fff;border:1px solid rgba(26,25,24,.11);border-radius:5px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.cat-svg-wrap svg{width:52px;height:52px;display:block}
.cat-hit-info{flex:1}
.cat-hit-word{font-size:14px;font-weight:500;direction:rtl}
.cat-hit-meta{font-size:11px;color:#04342C;margin-top:3px}
.cat-miss-info{flex:1}
.cat-miss-word{font-size:14px;font-weight:500;direction:rtl;color:#4A1B0C}

A semantic field becomes a representative word if removing it from the representative set would result in a representation that is less faithful to this memory as written and described by the narrator.

CRITERION 1 — Memorial Centrality
Is this element explicitly present in the written memory and part of what the narrator describes as central to what they are remembering?
satisfied: the narrator explicitly names, foregrounds, or specifically describes this element as part of the memory
unsatisfied: the element is semantically implied but not described — present in the event structure but not in what the narrator chose to express
ambiguous: the element is mentioned but its centrality to how the memory is described is unclear

CRITERION 2 — Fidelity Consequence
Would removing this element from the representative set produce a representation that is less faithful to this memory as written — one that could reasonably describe a different memory, or that misrepresents what this narrator described?
satisfied: removing this element would make the representation ambiguous or descriptive of a different kind of encounter
unsatisfied: removing this element leaves a representation that remains specific and faithful to what the narrator described
ambiguous: uncertain whether removal would reduce fidelity to the written memory

CRITERION 3 — Relational Anchoring
Does this element hold the relational configuration of the memory in place as described by the narrator?
satisfied: its absence would collapse or change the relational shape of the encounter as written
unsatisfied: its absence leaves the relational shape intact; other elements hold the configuration
ambiguous: partially holds the relational configuration

CRITERION 4 — Distinct Contribution
Does this element carry something about this specific memory that is not already carried by another element in the representative set?
satisfied: carries an aspect of what the narrator described that no other selected element already covers
unsatisfied: another selected element fully covers what this would contribute at the level of the written memory
ambiguous: partial overlap with another element's contribution

For fields retained by the Memory Identity Gate (identityGate: "changes-identity"): set all criterion values to "not-evaluated".
For fields reaching Step 7b: assess all four criteria and record the reasoning explicitly.

DECISION: Fields retained by the Memory Identity Gate are automatically representative words. For fields evaluated in Step 7b: a semantic field becomes a representative word when the criterion assessments together support the conclusion that removing it would reduce the representation's fidelity to the written memory. The decision must be stated with explicit reference to the written memory. [H-002]: all criterion assessments must be factual. Do not infer significance beyond what is stated.

Step 8: Must Preserve Consistency Gate.
For each mustPreserve statement:
  a. Identify which participants or relationships are required
  b. Verify all required participants appear in representativeWords
  c. If a relationship requires multiple participants, all must appear or absence must be justified on fidelity grounds — specifically, why the written memory's requirements are still satisfied
  d. Silent violation is not permitted

LANGUAGE RULE: All user-facing fields in the memory language. canonicalReferent always English lowercase.
OUTPUT RULE: Valid JSON only. No markdown. No preamble. Begin with {.

CRITICAL RULES — THESE ARE HARD CONSTRAINTS FROM THE GOVERNING DOCUMENTS:

RULE A — Habitual and Recurring temporal annotations (Workflow Grammar, Stage 1.2, Step 4 and Stage 1.3, Step 5):
"Recurring and Habitual temporal annotations do not become Semantic Field candidates. They are preserved in the Event Model as a record of the memory's occurrence pattern."
In Hebrew, the grammatical construction "היה + verb" (e.g. "היה מכין", "היה קורא") is the structural modifier that signals habitual recurrence. It is not a temporal referent — it carries no independently meaningful time content. It is the equivalent of "used to" or "would" in English.
Procedure: record temporalContext as "habitual" in memoryFrame ONLY. The habitual annotation must not enter semanticFields. It must not enter representativeWords. No form of "הרגל חוזר", "recurring", "habitual", or equivalent may appear in representativeWords under any circumstances.

RULE B — Temporal referents and the D1 identity gate (Workflow Grammar Stage 1.3 Reducibility Clarification; Semantic Methodology D1 and D2):
Temporal referents such as "לצהריים", "בבוקר", "בערב" pass the Reducibility Criterion and enter as Candidate Semantic Fields. BUT Stage 1.3 states: "D1 remains responsible for determining whether any specific instance survives as a Representative Word."
Apply D1 strictly: "If this element is removed, would the resulting representation still be recognized as the same memory, or would it become a different memory?" (Semantic Methodology D1)
For time-of-day references like "לצהריים": removing "לצהריים" from "סבא מכין לי אורז עם אפונה וגזר במיקרוגל" leaves the same memory with reduced temporal specificity — not a different memory. This is a Detail (D2), not a Constituent. Do not promote it to Representative Word status.
The rule: temporal referents that contextualize WHEN without altering WHAT the memory is are Details. Only temporal referents whose removal would make the memory unrecognizable as itself are Constituents.

MANDATORY SELF-VALIDATION CHECKLIST — run this before producing output:

Check 1 — Habitual/recurring annotation not in representativeWords:
Scan your representativeWords array. If ANY entry contains: "הרגל", "חוזר", "recurring", "habitual", "pattern", or any description of occurrence frequency — REMOVE it immediately. This is a hard constraint with no exceptions (Workflow Grammar Stage 1.2 Step 4-5).

Check 2 — Each temporal referent in representativeWords has passed D1:
For each representativeWord with category "temporal-pattern" or "temporal-referent": ask "If I remove only this element from the memory, does the memory become a DIFFERENT memory, or the SAME memory with reduced specificity?" If the answer is "same memory with reduced specificity" — reclassify it as a Detail and REMOVE it from representativeWords. Do not retain temporal referents by default. (Semantic Methodology D1, D2)

Check 3 — No invented elements:
Every element in representativeWords must trace directly to a word or grammatical structure in the written memory. If an element has no direct textual anchor — REMOVE it. (Semantic Methodology P1, P3)

Check 4 — Consideration record matches representativeWords:
Every element in representativeWords must have a corresponding entry in considerationRecord with decision="representative". If an element appears in representativeWords but not in considerationRecord — add the entry or remove the word.

Check 5 — Word label derived from written memory (Semantic Methodology P1 Clarification — Lexical Form Fidelity):
The word field of each Representative Word must be derived from the written memory. The processor may not replace, normalize, or restructure the narrator's own words.
If the written memory contains "אותנו" — the word field must be "אותנו", not "אנחנו".
If the written memory contains "קורא לי עיתון" — the word field reflects that phrase, not a nominalized reconstruction.
The "canonicalReferent" field may hold a normalized or English description. The "word" field may not.
Violation: any word field that contains a lexical form not present in the written memory.

const VRP_PROMPT = `You are the Visual Representation Planner of a pictographic language engine.

You receive Representative Words selected by Stage 1 of the pipeline, plus context.

Your task: determine how each unit's meaning should survive into the final visual representation (Stage 2).

H-001 - Identity Criterion (Stage 2 - Visual Instantiation)
The identity criterion governs this stage independently. A mode assignment is valid only if the resulting pictogram sequence remains sufficient to distinguish this memory from the most plausible alternative memory a viewer could read from the same sequence.
Assumed viewer: familiar with the language conventions, but has no prior knowledge of this specific memory.
The criterion is NOT inherited from Stage 1. Passing Stage 1 does not guarantee Stage 2.

Test V - Visual Disambiguation Test: Assume a given unit has no independent pictogram. Construct the most plausible different memory a viewer could read from the remaining pictogram sequence. If the two memories are not visually distinguishable without prior knowledge, contextual expression alone fails the identity criterion.

CORE QUESTION: Not "Can this unit become a standalone pictogram?" Not "Is this meaning contextually readable?" Yes: "How should this meaning be represented such that the full sequence remains sufficient to identify this specific memory?"

MANDATORY REASONING ORDER
Step 1: Read the complete Representative Words set as a whole. Identify likely Independent candidates - these will be the contextual anchors available for other units.
Step 2: For each unit, execute Phase 2 in strict order: Possibility Inventory > Test V > Mode Decision. Do not assign a mode before completing Test V where applicable.
Step 3: Verify no expressedThrough list references a Contextual, Both, or Gap unit. Only Independent units produce pictograms and can serve as contextual anchors.

ILLUSTRATION GRAMMAR CONSTRAINTS
Construction: stroke-based geometry only, no filled areas.
Vocabulary: circle, ellipse, rectangle, square, line, arc, triangle. No free-form or invented shapes.
Viewpoint: frontal only. No perspective, profile, or 3/4 view.
Manipulation: combine, intersect, proportional scale, rotate only. No arbitrary deformation.

AVAILABLE MODES
INDEPENDENT: The unit requires its own pictogram. Contextual expression unavailable or fails Test V.
CONTEXTUAL: No independent pictogram. Meaning carried by co-presence, spatial relationship, sequencing, or combination with other Independent units. Valid only when contextual expression passes Test V. All expressedThrough references must be Independent units.
BOTH: Contextual expression available but fails Test V - sequence collapses without independent representation. Both encodings must be mutually reinforcing. Conflicting encodings are not valid.
GAP: Neither independent nor contextual expression available within the illustration grammar. The unit has been selected as a Representative Word and must be represented — a Gap records that the current language does not yet have the resources to do so.

FOUR-PHASE ANALYSIS PER UNIT

PHASE 1 - Semantic Nature Characterization (always run)
entityNature: person|object|place|symbol|action|relationship|quality
identityFeatures: 1-3 visual characteristics defining this referent's identity (what makes it recognizable as THIS specific thing)
inherentlyVisual: true if stable physical form; false if relational or abstract

PHASE 2 - Representation Mode Determination (three mandatory steps in order)

STEP 1 - Possibility Inventory
independentPossible: Can a frontal-viewpoint pictogram be built from the geometric vocabulary? (true/false)
independentRationale: Explain.
contextualPossible: Can the meaning be carried through relationship with other units? (true/false)
contextualRationale: Explain. If possible, name candidate units and mechanism.
contextualDependencies: array of candidate unit IDs (must be Independent-classified; empty if not possible)

STEP 2 - Test V - Visual Disambiguation Test [H-001 Stage 2]
ACTIVE CONSTRUCTION REQUIRED. Cannot be passed by intuition.

If contextualPossible is true:
  Assume this unit has NO independent pictogram.
  Construct the most plausible different memory a viewer could read from the remaining pictogram sequence, given no prior knowledge.
  applied: true
  alternativeMemory: the constructed alternative (in memory's language)
  visuallyDistinguishable: true if two memories distinguishable; false if they collapse
  testVConclusion: "passes"|"fails"

If contextualPossible is false:
  applied: false, alternativeMemory: null, visuallyDistinguishable: null, testVConclusion: "not-applicable"

STEP 3 - Mode Decision
Apply this decision table strictly:
  contextualPossible=true AND testVConclusion=passes -> contextual
  contextualPossible=true AND testVConclusion=fails AND independentPossible=true -> both
  contextualPossible=true AND testVConclusion=fails AND independentPossible=false -> gap
  contextualPossible=false AND independentPossible=true -> independent
  contextualPossible=false AND independentPossible=false -> gap

mode: "independent"|"contextual"|"both"|"gap"
modeRationale: one sentence stating which decision table row was applied
Provide sub-objects only for relevant mode(s):
  independent: {"visualConcept":"what would be drawn","constructible":true}
  contextual: {"expressedThrough":["unit_01"],"relationalMechanism":"co-presence|spatial-proximity|sequencing|combination","emergenceExplanation":"string"}
  gap: {"gapType":"vocabulary|construction|viewpoint|relational-encoding","gapRationale":"string","alternativeStrategy":"string or null"}
For Both mode: provide BOTH independent and contextual sub-objects.

PHASE 3 - Survivability Assessment
Confidence assessment on the mode decision. NOT a substitute for Test V. Assesses quality of a decision that has already satisfied the identity criterion.

For independent: survivabilityStatus:"recognized", independentConfidence:high|medium|low, contextualConfidence:"n/a", mutuallyReinforcing:null, assessment: will pictogram be immediately recognizable?
For contextual: survivabilityStatus:"emergent", independentConfidence:"n/a", contextualConfidence:high|medium|low, mutuallyReinforcing:null, assessment: will meaning reliably emerge?
For both: survivabilityStatus:"both-reinforcing"|"both-conflicting", independentConfidence:high|medium|low, contextualConfidence:high|medium|low, mutuallyReinforcing:true|false, assessment: do the two encodings strengthen each other or compete?
For gap: survivabilityStatus:"gap-absolute"|"gap-conditional", independentConfidence:"n/a", contextualConfidence:"n/a", mutuallyReinforcing:null, assessment: is gap resolvable through language extension?

PHASE 4 - Expressive Audit [H-002]
h002Status: "compliant"|"risk"|"violation"
auditNote: describe excess; state "none" if compliant.

const CAT=(()=>{
  let m={},n=35;
  function init(){CINIT.forEach(e=>{m[e.id]=e;});}
  function all(){return Object.values(m).sort((a,b)=>a.id.localeCompare(b.id));}
  function get(id){return m[id]||null;}
  function store(entry){const id='CAT-'+String(n++).padStart(4,'0');m[id]={...entry,id};return id;}
  function lookup(word){
    const w=(word||'').toLowerCase().trim();
    const hw=(word||'').trim();
    // Also try first word of multi-word concepts
    return Object.values(m).find(e=>
      (e.hebrew&&e.hebrew===hw)||
      (e.hebrew&&e.hebrew.split('/').some(h=>h.trim()===hw))||
      (e.concept&&e.concept.toLowerCase().split('/').some(c=>c.trim()===w))||
      (e.concept&&e.concept.toLowerCase()===w)||
      (e.concept&&e.concept.toLowerCase().includes(w)&&w.length>3)
    )||null;
  }
  return{init,all,get,store,lookup};
})();

function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function extractJSON(raw){
  if(!raw)throw new Error('Empty response');
  let s=raw.trim().replace(/^```(?:json)?\s*/im,'').replace(/\s*```\s*$/im,'').trim();
  const first=s.indexOf('{'),last=s.lastIndexOf('}');
  if(first===-1||last===-1||last<=first)throw new Error('No JSON object found');
  return JSON.parse(s.slice(first,last+1));
}

async function callAPI(system,user,maxTokens){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json',
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens,
      system:'You output only valid JSON. No markdown. No code fences. No explanation. Your response must be parseable by JSON.parse().',
      messages:[{role:'user',content:system+'\n\n---\n\n'+user}]})
  });
  if(!res.ok){const body=await res.json().catch(()=>({}));throw new Error(`API ${res.status}: ${body?.error?.message||res.statusText}`);}
  const data=await res.json();
  return data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
}

- path commands: M L A Z only — absolutely no C Q S T bezier curves
- rect corners: rx="4" where appropriate
- Frontal viewpoint only — no perspective, no 3/4 view
- Represents the CATEGORY, not a specific instance

PROCESS:
1. Study the reference SVG to understand the concept's essential visual identity
2. Identify the minimum set of geometric primitives that communicate the concept
3. Reconstruct using only the permitted elements and commands
4. Verify: if a machine drew ONLY circles, ellipses, rects, lines, and paths with M/L/A/Z commands, could it produce this? If not, simplify.

The output must be immediately recognizable as the concept within the 64×64 space.

Return ONLY this JSON — no markdown, no explanation:
{"svg":"<svg viewBox=\\"0 0 64 64\\" xmlns=\\"http://www.w3.org/2000/svg\\" fill=\\"none\\" stroke=\\"#231F20\\" stroke-width=\\"1.5\\" stroke-linecap=\\"round\\" stroke-linejoin=\\"round\\">...</svg>","geometricDescription":"...","principle1":"category-level identity preserved because...","principle2":"recognizability: ...","principle3":"all elements use only permitted primitives","principle4":"unambiguous in isolation because..."}`;

/* ─── Catalog lookup (Rule 3) ─── */
function buildSequenceSVG(vrpResult){
  const units=(vrpResult?.vrp||[]).filter(u=>['independent','both'].includes(u.phase2?.modeDecision?.mode));
  const N=units.length;if(!N)return'';
  const ps=64,gap=24,cW=856,cH=128;
  const totW=N*ps+(N-1)*gap,x0=(cW-totW)/2,y0=(cH-ps)/2;
  let inner='';
  units.forEach((u,i)=>{
    const hit=CAT.lookup(u.unit)||CAT.lookup(u.phase1?.entityNature?u.unit:u.unit);
    if(!hit?.viewBox)return;
    // Hebrew: right to left
    const rtl=currentResult?.memoryLanguage==='Hebrew';
    const x=rtl?x0+(N-1-i)*(ps+gap):x0+i*(ps+gap);
    const innerSvg=hit.viewBox?`<svg viewBox="${hit.viewBox}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="64" height="64" overflow="hidden">${LIBRARY_SVG}</svg>`:'';
    inner+=`<g transform="translate(${x},${y0})">${innerSvg.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'')}</g>`;
  });
  return inner?`<svg viewBox="0 0 ${cW} ${cH}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`:'';
}


/* ─── Rule 1 output validation (post-processing) ─── */
/* Enforces methodology rules from governing documents after API response */
function validateR1Output(data){
  const violations=[];
  const rws=data.representativeWords||[];

  // RULE A: Habitual/recurring annotations must not be in representativeWords
  // Source: Workflow Grammar Stage 1.2 Step 4-5
  // "Recurring and Habitual temporal annotations do not become Semantic Field candidates."
  const habitualPatterns=[/הרגל/,/חוזר/,/recurring/i,/habitual/i,/pattern/i,/מחזור/,/קבוע/];
  rws.forEach((rw,i)=>{
    const word=rw.word||'';
    const ref=rw.canonicalReferent||'';
    if(habitualPatterns.some(p=>p.test(word)||p.test(ref))){
      violations.push({
        type:'RULE_A_HABITUAL_IN_RW',
        severity:'error',
        element:word,
        index:i,
        rule:'Workflow Grammar Stage 1.2 Steps 4-5',
        message:`"${word}" appears to be a habitual/recurring temporal annotation and must not appear in representativeWords. Record temporalContext in memoryFrame only.`
      });
    }
  });

  // RULE B: Temporal referents must have passed D1 strictly
  // Source: Workflow Grammar Stage 1.3 Reducibility Clarification + Semantic Methodology D1
  // "D1 remains responsible for determining whether any specific instance survives as a Representative Word."
  const temporalCategories=['temporal-pattern','temporal-referent','temporal'];
  rws.forEach((rw,i)=>{
    if(temporalCategories.includes(rw.category)){
      // Find the consideration record entry for this RW
      const cr=(data.considerationRecord||[]).find(c=>c.fieldId===rw.id||c.field===rw.word);
      if(!cr){
        violations.push({
          type:'RULE_B_TEMPORAL_NO_D1_RECORD',
          severity:'warning',
          element:rw.word,
          index:i,
          rule:'Semantic Methodology D1; Workflow Grammar Stage 1.3',
          message:`Temporal referent "${rw.word}" is in representativeWords but has no consideration record entry documenting D1 application.`
        });
      } else if(cr.identityGate==='reduces-detail'&&cr.decision==='representative'){
        violations.push({
          type:'RULE_B_TEMPORAL_D1_FAILED',
          severity:'error',
          element:rw.word,
          index:i,
          rule:'Semantic Methodology D1, D2',
          message:`Temporal referent "${rw.word}" was classified as reduces-detail by identityGate but promoted to representative. D1 requires it be classified as a Detail (D2). It should not be in representativeWords.`
        });
      }
    }
  });

  // RULE C: No element in RW without a direct textual anchor
  // Source: Semantic Methodology P1, P3
  rws.forEach((rw,i)=>{
    if(!rw.sourceText||rw.sourceText.trim()===''){
      violations.push({
        type:'RULE_C_NO_TEXTUAL_ANCHOR',
        severity:'warning',
        element:rw.word||'unknown',
        index:i,
        rule:'Semantic Methodology P1, P3',
        message:`"${rw.word}" has no sourceText — cannot verify it has a direct textual anchor in the written memory.`
      });
    }
  });

  // RULE D: Word label must be derived from written memory — not normalized or substituted
  // Source: Semantic Methodology P1 Clarification — Lexical Form Fidelity (newly added)
  const memoryText=data.coreNarrative||'';
  // Check each RW: if word differs from sourceText substantially, flag for review
  rws.forEach((rw,i)=>{
    const word=(rw.word||'').trim();
    const source=(rw.sourceText||'').trim();
    if(!source||!word) return;
    // If the word is not found anywhere in the source text fragment or original memory, flag it
    // This catches cases where the processor substituted a different form (e.g. "אנחנו" for "אותנו")
    if(source.length>0&&!source.includes(word)&&!word.includes(source)&&word!==source){
      // Only flag if the divergence is substantial (not just punctuation)
      const wordCore=word.replace(/[""״]/g,'').trim();
      const sourceCore=source.replace(/[""״]/g,'').trim();
      if(wordCore!==sourceCore&&!sourceCore.includes(wordCore)&&!wordCore.includes(sourceCore)){
        violations.push({
          type:'RULE_D_LEXICAL_SUBSTITUTION',
          severity:'warning',
          element:word,
          index:i,
          rule:'Semantic Methodology P1 Clarification — Lexical Form Fidelity',
          message:`Word label "${word}" differs from sourceText "${source}". The word label must be derived from what the narrator wrote — not substituted with a normalized or restructured form.`
        });
      }
    }
  });

  return violations;
}

function renderValidationViolations(violations,container){
  if(!violations.length)return;
  const html=`<div style="border:1px solid #C09060;background:#FDF5E8;border-radius:var(--r);padding:14px 16px;margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7A4900;margin-bottom:10px">Methodology Validation — ${violations.length} issue${violations.length>1?'s':''} detected</div>
    ${violations.map(v=>`<div style="padding:8px 0;border-bottom:1px solid rgba(122,73,0,.12);font-size:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <span style="font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;background:${v.severity==='error'?'#FAECE7':'#FDF5E8'};color:${v.severity==='error'?'#9B3010':'#7A4900'}">${v.severity==='error'?'▲ violation':'◑ warning'}</span>
        <span style="font-weight:500;color:#231F20;direction:rtl">${v.element}</span>
        <span style="font-size:10px;color:#8A8685;margin-right:auto">${v.type}</span>
      </div>
      <div style="color:#4a4845;margin-bottom:2px;direction:rtl;text-align:right">${v.message}</div>
      <div style="font-size:10px;color:#8A8685">Source: ${v.rule}</div>
    </div>`).join('')}

  container.insertAdjacentHTML('afterbegin',html);
}


function createFileInput(conceptLabel, gapEl){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.svg,image/svg+xml';
  inp.style.display='none';
  document.body.appendChild(inp);
  inp.addEventListener('change',async ()=>{
    const file=inp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async (e)=>{
      const svgContent=e.target.result;
      await realizeFromReference(conceptLabel,svgContent,gapEl);
    };
    reader.readAsText(file);
    document.body.removeChild(inp);
  });
  inp.click();
}

async function realizeFromReference(conceptLabel,referenceSvg,gapEl){
  // Show loading state in the gap element
  const statusEl=gapEl.querySelector('.realize-status');
  if(statusEl){statusEl.textContent='Realizing…';statusEl.style.color='var(--t3)';}

  try{
    const userMsg=`Concept: ${conceptLabel}\n\nReference SVG:\n${referenceSvg}`;
    const raw=await callAPI(R3_PROMPT,userMsg,3000);
    const parsed=extractJSON(raw);
    if(!parsed?.svg)throw new Error('No SVG in response');

    // Store in catalog
    const catId=CAT.store({
      concept:conceptLabel,
      hebrew:conceptLabel,
      svg:parsed.svg,
      viewBox:null, // realized SVGs use direct svg field
      strategy:'Direct Iconic Representation',
      provisional:false,
      provenance:'processor-realized'
    });

    // Re-render the gap element as a hit
    gapEl.className='cat-hit';
    gapEl.innerHTML=`
      <div class="cat-svg-wrap">${parsed.svg}</div>
      <div class="cat-hit-info">
        <div class="cat-hit-word">${esc(conceptLabel)}</div>
        <div class="cat-hit-meta">✓ Realized → ${catId}</div>
        <div class="cat-hit-meta" style="margin-top:2px;font-size:10px;color:var(--t3)">${esc(parsed.geometricDescription||'')}</div>
      </div>`;

    // Rebuild sequence if present
    if(currentVrpResult) rebuildSequence();

  }catch(err){
    if(statusEl){statusEl.textContent=`Error: ${err.message}`;statusEl.style.color='#C0392B';}
  }
}

function getRealSvg(entry){
  // Entries have either .svg (direct) or .viewBox (library crop)
  if(entry.svg)return entry.svg;
  if(entry.viewBox)return libSVG(entry.viewBox);
  return '';
}

function rebuildSequence(){
  const seqEl=document.querySelector('.seq-display');if(!seqEl||!currentVrpResult)return;
  const units=(currentVrpResult?.vrp||[]).filter(u=>['independent','both'].includes(u.phase2?.modeDecision?.mode));
  const N=units.length;if(!N)return;
  const ps=64,gap=24,cW=856,cH=128,totW=N*ps+(N-1)*gap,x0=(cW-totW)/2,y0=(cH-ps)/2;
  let inner='';
  const rtl=currentResult?.memoryLanguage==='Hebrew';
  units.forEach((u,i)=>{
    const cr=(currentResult?.considerationRecord||[]).find(c=>c.fieldId===u.unitId);
    const hit=CAT.lookup(u.unit)||(cr?.canonicalReferent?CAT.lookup(cr.canonicalReferent):null);
    if(!hit)return;
    const x=rtl?x0+(N-1-i)*(ps+gap):x0+i*(ps+gap);
    const svgHtml=getRealSvg(hit);
    const inner_svg=svgHtml.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'');
    inner+=`<g transform="translate(${x},${y0})">${inner_svg}</g>`;
  });
  if(inner)seqEl.innerHTML=`<svg viewBox="0 0 ${cW} ${cH}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
}

function renderCatalogSection(vrpResult){
  const container=document.getElementById('catalog-section');if(!container)return;
  const units=(vrpResult?.vrp||[]).filter(u=>['independent','both'].includes(u.phase2?.modeDecision?.mode));
  let hits=0,gaps=0;
  const rows=units.map(u=>{
    const word=u.unit||'';
    const canonical=u.phase2?.modeDecision?.independent?.visualConcept||word;
    // Try lookup by Hebrew word, then by canonical referent from consideration record
    const cr=(currentResult?.considerationRecord||[]).find(c=>c.fieldId===u.unitId);
    const hit=CAT.lookup(word)||(cr?.canonicalReferent?CAT.lookup(cr.canonicalReferent):null);
    if(hit){
      hits++;
      const svgHtml=hit.viewBox?libSVG(hit.viewBox):'';
      const provNote=hit.provisional?`<div class="prov-note">⚑ ${esc(hit.provisionalNote||'provisional label — requires confirmation')}</div>`:'';
      return`<div class="cat-hit"><div class="cat-svg-wrap">${svgHtml}</div><div class="cat-hit-info"><div class="cat-hit-word">${esc(word)}</div><div class="cat-hit-meta">✓ ${esc(hit.id)} — ${esc(hit.concept)}${hit.hebrew&&hit.hebrew!==word?' / '+esc(hit.hebrew):''}${hit.provisional?' ⚑ provisional':''}</div>${provNote}</div></div>`;
    } else {
      gaps++;
      const gapId='gap-'+u.unitId;
      return`<div class="cat-miss" id="${gapId}"><div class="cat-miss-info"><div class="cat-miss-word">${esc(word)}</div><div class="cat-miss-meta">VISUAL GAP — אין צורה מבוססת בספרייה עבור "${esc(word)}"</div>${cr?.canonicalReferent?`<div style="font-size:10px;color:#9B4D2C;margin-top:2px">canonical: ${esc(cr.canonicalReferent)}</div>`:''}<div style="margin-top:8px;display:flex;align-items:center;gap:10px"><button onclick="createFileInput(${JSON.stringify(word)},document.getElementById(${JSON.stringify(gapId)}))" style="padding:4px 11px;font-size:11px;font-family:var(--f);border:1px solid #C0846A;border-radius:5px;background:transparent;color:#9B4D2C;cursor:pointer">↑ Upload reference SVG</button><span class="realize-status" style="font-size:10.5px;color:var(--t3)"></span></div></div></div>`;
    }
  });

  const seqSvg=buildSequenceSVG(vrpResult);
  const hasSeq=seqSvg&&hits>0;

  container.innerHTML=`
    <div class="divider"></div>
    <div class="sec-label">Library Lookup <span>${hits} hit${hits!==1?'s':''}, ${gaps} gap${gaps!==1?'s':''}</span></div>
    ${rows.join('')}
    ${hasSeq?`<div style="margin-top:20px"><div class="sec-label">Pictographic Sequence</div><div class="seq-display">${seqSvg}</div>${gaps>0?`<div style="font-size:11px;color:#D85A30;margin-top:6px">${gaps} word${gaps!==1?'s':''} could not be realized — VISUAL GAP events recorded. The sequence is incomplete.</div>`:''}</div>`:''}
  `;
}

async function analyze(){

  let raw='';

      await new Promise(r=>setTimeout(r,700));

const ARA_PROMPT = `You are the Action Representation Analyst of a pictographic language engine.

You receive Stage 1 RSU output and Stage 2 VRP output for a written memory.
Your task: compare two candidate strategies for representing action-related RSUs, and expose patterns. This is comparative research — do not select a final strategy.

ACTIVE LANGUAGE PRINCIPLES
1. Individual pictograms must be independently recognizable as their referents.
2. Referential recognition precedes sequence interpretation.
3. The primary meaning-bearing structure is the pictographic sequence.
4. For Hebrew memories, sequences are read right to left.
5. Sequence order is a confirmed grammar rule of this language. Earlier positions represent the source, initiator, actor, or preceding element within the remembered event. This is not a working assumption — it is an established constraint.
6. What sequence order encodes: directional and agentive structure — who initiates, who receives, what comes first in the event structure.
7. What sequence order does not encode: relationship type. Teaching and showing share the same directional structure (agent initiates toward recipient). Guiding and accompanying share the same structure. Sequence order cannot distinguish between actions that have identical directionality but different relational meaning.
8. Meaning emerges from sequence order, adjacency, relative position, and relationships between pictograms.

H-001 — SEQUENCE-LEVEL IDENTITY PRESERVATION
The sequence produced by a strategy must distinguish this memory from the most plausible alternative a viewer with no prior knowledge could read from it.
This test applies at the FULL SEQUENCE level, not only the unit level.
When applying this test, sequence order functions as a confirmed grammar constraint. A sequence that encodes agent→recipient directionality produces a different reading than a symmetric sequence.

H-002 — SCOPE FOR THIS STAGE
H-002 governs semantic extraction only. In this stage, visual proxies are permitted.
A visual proxy represents an action through a strongly associated referent, even if not explicitly in the memory.
Examples: Books may proxy "taught." A fishing rod may proxy "fished."
Proxies must be flagged (h002Tension: true). They are representation choices, not violations. H-002 is violated only if a proxy is treated as a factual memory element rather than a strategic choice.

THE TWO STRATEGIES

OBJECT SUBSTITUTION: The action is encoded through a strongly associated object that enters the sequence as a pictogram.
Substitute must be: visually constructible from geometric vocabulary (circle, ellipse, rectangle, square, line, arc, triangle), strongly and distinctively associated with this specific action, not already present as a primary RSU, and sufficiently specific.
Failure conditions: no distinctive object exists; object already in sequence; object too generic; object distorts memory emphasis.

ACTION DISAPPEARANCE: The action is not represented. The sequence contains only participants, objects, and locations. Meaning emerges from configuration of who is present, in what order, with what objects.
Confirmed grammar applies: sequence order encodes directionality, so [Agent][Recipient][Object] reads differently from [Object][Agent][Recipient].
Failure conditions: remaining sequence collapses with a plausible alternative memory; the specific ambiguity is relationship TYPE (not directionality) between participants with the same directional structure, and no other element resolves it.

SEQUENCE-LEVEL IDENTITY PRESERVATION TEST
Construct the proposed sequence for each strategy. Ask: what is the most plausible alternative memory a viewer with no prior knowledge would read from this sequence?
Apply the confirmed sequence grammar: earlier positions encode agents/initiators; later positions encode recipients/targets. This is not optional — it is part of the language.

PASS: original and alternative are visually distinguishable. This includes cases where confirmed sequence order resolves directional or agentive ambiguity.
FAIL: they collapse, or the alternative is more prototypical, even when sequence order is applied correctly.
UNDETERMINED: sequence order is confirmed and functioning correctly, but the specific ambiguity is RELATIONSHIP TYPE between participants with identical directionality (e.g. teaching vs. showing, both have agent→recipient structure; guiding vs. accompanying, both have leading→following structure). No element in the sequence resolves which type of directed relationship occurred. UNDETERMINED applies only here — not whenever sequence order is involved.

ANALYSIS PROCEDURE
Step 1: Identify which units have primarily action or relational meaning and require strategy evaluation.
Step 3: Establish the base sequence. List non-action RSUs in narrative order. State what a viewer would most plausibly read from this base sequence alone. Apply sequence order as a confirmed grammar constraint.
Step 4: For each non-Dispensable action RSU, evaluate both strategies fully.
Step 5: State comparative finding per action RSU.
Step 6: State sequence-level finding across all action RSUs.

LANGUAGE RULE: All user-facing text in the memory language. canonicalReferent always English lowercase.
OUTPUT RULE: Valid JSON only. No markdown. No preamble. Begin with {.

JSON SCHEMA:

// State already declared above
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function badge(label,bg,b,t){return `<span class="badge" style="background:${bg};border:1px solid ${b};color:${t}">${esc(label)}</span>`}
function typeBadge(type){const c=TYPE_CFG[type]||TYPE_CFG.other;return badge(c.label,c.bg,c.b,c.t)}
function decBadge(d){const a=d==='accepted';return `<span class="badge" style="background:${a?'#E1F5EE':'#F4F3F1'};border:1px solid ${a?'#5DCAA5':'#C8C6C0'};color:${a?'#04342C':'#6B6A67'};font-weight:600;text-transform:uppercase;letter-spacing:.06em">${esc(d)}</span>`}
function roleBadge(r){const c=ROLE_CFG[r]||ROLE_CFG.instrument;return badge(r,c.bg,c.b,c.t)}
function modeBadge(m){const c=MODE_CFG[m]||MODE_CFG.gap;return badge(c.label,c.bg,c.b,c.t)}
function idBadge(id){return `<span class="id-badge">${esc(id)}</span>`}
function sectionLabel(text,ann){return `<div class="sec-label">${esc(text)}${ann?`<span>${esc(ann)}</span>`:''}</div>`}
function fieldRow(label,value,rtl,hl){if(!value&&value!==false)return '';return `<div class="field-row"><span class="field-lbl${hl?' hl':''}">${esc(label)}</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(value)}</span></div>`}
function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
function confBadge(conf){if(!conf||conf==='n/a')return '';const bg=conf==='high'?'#E1F5EE':conf==='medium'?'#FAEEDA':'#FAECE7';const b=conf==='high'?'#5DCAA5':conf==='medium'?'#EF9F27':'#F0997B';const t=conf==='high'?'#04342C':conf==='medium'?'#412402':'#4A1B0C';return badge(conf+' confidence',bg,b,t)}
function depChips(ids,units){if(!ids||!ids.length)return '<span class="dep-chip">-</span>';return ids.map(uid=>{const ref=(units||[]).find(u=>u.id===uid);const lbl=ref?(ref.word||ref.unit||uid):uid;return `<span class="dep-chip">${esc(uid)}${ref?' - '+esc(lbl):''}</span>`}).join('')}

}

function renderResults(result){
  currentResult=result;currentVrpResult=null;currentAraResult=null;
  const rtl=result.memoryLanguage==='Hebrew';
  const sf=result.semanticFields||[];
  const consideration=result.considerationRecord||[];
  const representative=consideration.filter(c=>c.decision==='representative');

  const repWords=result.representativeWords||[];
  let html=`<div class="divider"></div><div class="lang-meta"><span class="lang-badge">${esc(result.memoryLanguage)}</span><span class="meta-counts">${sf.length} semantic fields &middot; ${representative.length} representative &middot; ${semanticOnly.length} semantic-only</span></div>`;
  html+=`<div class="mb28">${sectionLabel('Core Narrative')}<div class="narrative-card" dir="${rtl?'rtl':'ltr'}">${esc(result.coreNarrative)}</div></div>`;
  if(result.memoryFrame){const f=result.memoryFrame;const tc=TEMPORAL_CFG[f.temporalContext]||TEMPORAL_CFG.singular;let fi=`<div class="frame-item"><div class="frame-item-lbl">Temporal context</div><div class="frame-item-val">${badge(tc.label,tc.bg,tc.b,tc.t)}</div></div>`;if(f.location)fi+=`<div class="frame-item"><div class="frame-item-lbl">Location</div><div class="frame-item-val" dir="${rtl?'rtl':'ltr'}">${esc(f.location)}</div></div>`;if(f.recurrencePattern)fi+=`<div class="frame-item"><div class="frame-item-lbl">Recurrence</div><div class="frame-item-val" dir="${rtl?'rtl':'ltr'}">${esc(f.recurrencePattern)}</div></div>`;if(f.period)fi+=`<div class="frame-item"><div class="frame-item-lbl">Period</div><div class="frame-item-val" dir="${rtl?'rtl':'ltr'}">${esc(f.period)}</div></div>`;html+=`<div class="mb28">${sectionLabel('Memory Frame')}<div class="frame-card">${fi}</div></div>`;}
  if(result.events&&result.events.length>0){const evH=result.events.map((ev,i)=>{const nc=NUCLEUS_COLORS[ev.nucleus?.type]||'#888780';const parts=(ev.participants||[]).map((p,pi)=>{const rc=ROLE_CFG[p.role]||ROLE_CFG.instrument;const isLast=pi===ev.participants.length-1&&!ev.purpose;return `<div class="part-row${isLast?' last':''}"><span class="role-dot" style="background:${rc.dot}"></span><span class="part-ref" dir="${rtl?'rtl':'ltr'}">${esc(p.referent)}${p.isNarrator?'<span class="narrator-tag">narrator</span>':''}</span>${roleBadge(p.role)}</div>`;}).join('');const purp=ev.purpose?`<div class="purpose-row"><span class="purpose-dot"></span><span class="purpose-lbl">purpose</span><span class="badge" style="background:#FAEEDA;border:1px solid #EF9F27;color:#412402">${esc(ev.purpose)}</span></div>`:'';return `<div class="event-card"><div class="event-hdr"><div class="event-num">${i+1}</div><span class="event-type" style="color:${nc}">${esc(ev.nucleus?.type||'')}</span><span class="event-desc" dir="${rtl?'rtl':'ltr'}">${esc(ev.nucleus?.description||'')}</span>${ev.specificLocation?`<span class="event-loc">${esc(ev.specificLocation)}</span>`:''}</div><div class="event-parts">${parts}${purp}</div></div>`;}).join('');html+=`<div class="mb28">${sectionLabel('Events',`${result.events.length} event${result.events.length>1?'s':''}`)}<div class="events-list">${evH}</div></div>`;}
  // Semantic Fields (Part A)
  if(sf.length>0){const sfH=sf.map(f=>{const cc=SF_CATEGORY_CFG[f.category]||{label:f.category||'',bg:'#F1EFE8',b:'#D3D1C7',t:'#444441'};return `<div class="sf-row"><span class="sf-field" dir="${rtl?'rtl':'ltr'}">${esc(f.field)}</span>${badge(cc.label,cc.bg,cc.b,cc.t)}${f.description?`<span class="sf-desc">${esc(f.description)}</span>`:''}</div>`;}).join('');html+=`<div class="mb28">${sectionLabel('Semantic Fields \u2014 Part A',`${sf.length} fields`)}<div class="sf-list">${sfH}</div></div>`;}
  // Semantic Structure
  if(result.semanticStructure){const s=result.semanticStructure;const pres=(s.mustPreserve||[]).map(item=>`<li class="must-item"><span class="must-dot"></span><span class="must-text" dir="${rtl?'rtl':'ltr'}">${esc(item)}</span></li>`).join('');html+=`<div class="mb28">${sectionLabel('Semantic Structure')}<div class="card"><div class="sem-summary" dir="${rtl?'rtl':'ltr'}">${esc(s.summary)}</div>${pres?`<div class="must-lbl">Must preserve</div><ul class="must-list">${pres}</ul>`:''}</div></div>`;}
  // Consideration Record (Part B)
  const stripDots=consideration.map(c=>`<span class="strip-dot" title="${esc(c.field)} \u2014 ${esc(c.decision)}" style="background:${c.decision==='representative'?ACC:REJ}"></span>`).join('');
  html+=`<div class="mb36" id="decision-section">${sectionLabel('Consideration Record \u2014 Part B',`${consideration.length} fields evaluated`)}<div class="sel-strip">${stripDots}</div><div class="filter-tabs" id="filter-tabs"><button class="filter-tab active" data-filter="all">All &nbsp;${consideration.length}</button><button class="filter-tab" data-filter="representative">Representative &nbsp;${representative.length}</button><button class="filter-tab" data-filter="semantic-only">Semantic-only &nbsp;${semanticOnly.length}</button></div><div class="trace-rows" id="trace-rows"></div></div>`;
  // Representative Words
  const rwCards=repWords.map((rw,i)=>{const cc=SF_CATEGORY_CFG[rw.category]||{label:rw.category||'',bg:'#F1EFE8',b:'#D3D1C7',t:'#444441'};return `<div class="unit-card"><div class="unit-num">${i+1}</div><div class="unit-body"><div class="unit-name-row"><span class="unit-name" dir="${rtl?'rtl':'ltr'}">${esc(rw.word)}</span>${badge(cc.label,cc.bg,cc.b,cc.t)}</div><div class="unit-src" dir="${rtl?'rtl':'ltr'}"><em>"${esc(rw.sourceText)}"</em></div></div></div>`;}).join('');
  html+=`<div class="mb28">${sectionLabel('Representative Words',`${repWords.length} words`)}<div class="units-list">${rwCards}</div></div>`;
  // Consistency gate
  if(result.consistencyGateStatus){const gPass=result.consistencyGateStatus==='pass';const gc=gPass?{bg:'#E1F5EE',b:'#5DCAA5',t:'#04342C'}:{bg:'#FAECE7',b:'#F0997B',t:'#4A1B0C'};const compRows=(result.mustPreserveCompliance||[]).map(c=>{const ok=c.satisfied;const unitBadges=(c.satisfiedBy||[]).map(uid=>`<span class="dep-chip">${esc(uid)}</span>`).join('');return `<div class="compliance-row"><div class="compliance-icon ${ok?'compliance-pass':'compliance-fail'}">${ok?'&#10003;':'&#215;'}</div><div class="compliance-body"><div class="compliance-req" dir="${rtl?'rtl':'ltr'}">${esc(c.requirement)}</div>${unitBadges?`<div class="compliance-units">${unitBadges}</div>`:''}<div class="compliance-violation">${!ok&&c.violation?esc(c.violation):''}</div></div></div>`;}).join('');html+=`<div class="gate-card" style="background:${gc.bg};border-color:${gc.b};margin-bottom:28px"><div class="gate-hdr"><span class="gate-status-lbl" style="color:${gc.t}">Consistency gate \u00b7 ${gPass?'Pass':'Fail'}</span>${!gPass?badge('Stage 1 violation','#FAECE7','#F0997B','#4A1B0C'):badge('Stage 1 \u2192 Stage 2 clear','#E1F5EE','#5DCAA5','#04342C')}</div>${result.consistencyGateNote?`<div class="gate-note" style="color:${gc.t}" dir="${rtl?'rtl':'ltr'}">${esc(result.consistencyGateNote)}</div>`:''}${compRows?`<div class="compliance-list">${compRows}</div>`:''}</div>`;}
  const gateWarn=result.consistencyGateStatus==='fail'?`<div class="gate-warn">Consistency gate failed. The VRP will receive an incomplete representative word set. Review before proceeding.</div>`:'';
  html+=`<div class="vrp-trigger-zone" id="vrp-trigger-zone"><div id="vrp-inner">${sectionLabel('Visual Representation Plan')}${gateWarn}<button class="generate-vrp-btn" id="generate-vrp-btn">Generate Visual Representation Plan \u2192</button></div></div>`;
  document.getElementById('results').innerHTML=html;
  renderConsiderationRows(consideration,repWords,rtl);
  document.getElementById('generate-vrp-btn').addEventListener('click',generateVrp);
}

function renderConsiderationRows(consideration,repWords,rtl){
  const filter=currentFilter;
  const items=filter==='representative'?consideration.filter(c=>c.decision==='representative'):filter==='semantic-only'?consideration.filter(c=>c.decision==='semantic-only'):consideration;
  const critLabels=['Memorial centrality','Fidelity consequence','Relational anchoring','Distinct contribution'];
  const html=items.map(c=>{
    const isRep=c.decision==='representative';const ac=isRep?ACC:REJ;
    const cc=SF_CATEGORY_CFG[c.category]||{label:c.category||'',bg:'#F1EFE8',b:'#D3D1C7',t:'#444441'};
    const decB=isRep?badge('Representative','#E1F5EE','#5DCAA5','#04342C'):badge('Semantic only','#F4F3F1','#C8C6C0','#3A3835');
    const gateVal=c.identityGate||'reduces-detail';
    const gateChanges=gateVal==='changes-identity';
    const gateBg=gateChanges?'#FAEEDA':'#F4F3F1';
    const gateB=gateChanges?'#EF9F27':'#C8C6C0';
    const gateT=gateChanges?'#412402':'#3A3835';
    const gateLabel=gateChanges?'Changes memory identity':'Reduces detail only';
    const gateHtml=`<div class="id-gate-row" style="background:${gateBg};border-color:${gateB}"><div class="id-gate-lbl" style="color:${gateT}">Memory Identity Gate — ${gateLabel}</div>${c.identityGateReason?`<div class="id-gate-reason" style="color:${gateT}" dir="${rtl?'rtl':'ltr'}">${esc(c.identityGateReason)}</div>`:''}</div>`;
    let criteriaHtml='';
    if(!gateChanges){
      criteriaHtml=`<div class="crit-list">${[1,2,3,4].map(n=>{const val=c['criterion'+n]||'ambiguous';const reason=c['criterion'+n+'Reason']||'';if(val==='not-evaluated')return '';const ccfg=CRIT_CFG[val]||CRIT_CFG.ambiguous;return `<div class="crit-row"><span class="crit-lbl-col">C${n} ${critLabels[n-1]}</span><div class="crit-content">${badge(val,ccfg.bg,ccfg.b,ccfg.t)}${reason?`<span class="crit-reason" dir="${rtl?'rtl':'ltr'}">${esc(reason)}</span>`:''}</div></div>`;}).join('')}</div>`;
    }else{
      criteriaHtml=`<div style="font-size:11px;color:var(--t3);font-style:italic;padding:2px 0 6px">Criteria not evaluated — retained by Memory Identity Gate.</div>`;
    }
    return `<div class="trace-row" style="border-left:3px solid ${ac};opacity:${isRep?1:.6}"><button class="trace-hdr" data-uid="${esc(c.fieldId)}"><span class="trace-dot" style="background:${ac}"></span><span class="trace-name" dir="${rtl?'rtl':'ltr'}">${esc(c.field)}</span>${badge(cc.label,cc.bg,cc.b,cc.t)}${decB}<span class="chevron" id="chev-${esc(c.fieldId)}">&#9662;</span></button><div class="trace-det" id="det-${esc(c.fieldId)}" hidden>${gateHtml}${criteriaHtml}${c.decisionReason?fieldRow('Decision reasoning',c.decisionReason,rtl,true):''}<div class="trace-ref">ref: ${esc(c.canonicalReferent)}</div></div></div>`;
  }).join('');
  const container=document.getElementById('trace-rows');if(container)container.innerHTML=html;
  document.querySelectorAll('.filter-tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.filter===filter));
}

function buildPhase2HTML(v,rtl,units){
  const p2=v.phase2||{};const pi=p2.possibilityInventory||{};const tv=p2.testV||{};const md=p2.modeDecision||{};const mode=md.mode||'gap';const mc=MODE_CFG[mode]||MODE_CFG.gap;
  const indCls=pi.independentPossible?'poss-yes':'poss-no';const indMk=pi.independentPossible?'&#10003;':'&#215;';
  const ctxCls=pi.contextualPossible?'poss-yes':'poss-no';const ctxMk=pi.contextualPossible?'&#10003;':'&#215;';
  const ctxDeps=(pi.contextualDependencies||[]).length>0?`<div class="dep-units">${depChips(pi.contextualDependencies,units)}</div>`:'';
  const step1=`<div class="vrp-step"><div class="vrp-step-hdr"><span class="vrp-step-lbl">Step 1 - Possibility inventory</span></div><div class="vrp-step-body"><div class="poss-row"><div class="poss-icon ${indCls}">${indMk}</div><div class="poss-body"><div class="poss-label">Independent ${pi.independentPossible?'possible':'not possible'}</div>${pi.independentRationale?`<div class="poss-rationale">${esc(pi.independentRationale)}</div>`:''}</div></div><div class="poss-row"><div class="poss-icon ${ctxCls}">${ctxMk}</div><div class="poss-body"><div class="poss-label">Contextual ${pi.contextualPossible?'possible':'not possible'}</div>${pi.contextualRationale?`<div class="poss-rationale">${esc(pi.contextualRationale)}</div>`:''}${ctxDeps}</div></div></div></div>`;
  let step2='';
  if(!tv.applied||tv.testVConclusion==='not-applicable'){step2=`<div class="vrp-step"><div class="vrp-step-hdr"><span class="vrp-step-lbl">Step 2 - Test V &middot; Visual disambiguation</span></div><div class="vrp-step-body"><div class="testv-na">Not applicable - contextual expression not available for this unit.</div></div></div>`;}
  else{const passes=tv.testVConclusion==='passes';const tvBg=passes?'#E1F5EE':'#FAECE7';const tvB=passes?'#5DCAA5':'#F0997B';const tvT=passes?'#04342C':'#4A1B0C';const tvMsg=passes?'Contextual expression is disambiguation-sufficient.':'Contextual expression alone does not preserve visual identity.';step2=`<div class="vrp-step"><div class="vrp-step-hdr"><span class="vrp-step-lbl">Step 2 - Test V &middot; Visual disambiguation</span></div><div class="vrp-step-body">${tv.alternativeMemory?`<div><div class="testv-alt-lbl">Alternative memory constructed</div><div class="testv-alt" dir="${rtl?'rtl':'ltr'}">${esc(tv.alternativeMemory)}</div></div>`:''}<div class="testv-conclusion">${badge(passes?'Passes':'Fails',tvBg,tvB,tvT)}<span style="font-size:12px;color:var(--t2)">${tvMsg}</span></div></div></div>`;}
  let modeDetail='';
  if(mode==='independent'&&md.independent){modeDetail=`<div class="vrp-mode-box" style="background:${mc.boxBg};border-color:${mc.boxB}"><div class="vrp-mode-box-lbl" style="color:${mc.t}">Visual concept</div>${md.independent.visualConcept?`<div class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(md.independent.visualConcept)}</div>`:''}${fieldRow('Constructible',md.independent.constructible?'Yes':'No',false,false)}</div>`;}
  else if(mode==='contextual'&&md.contextual){const ctx=md.contextual;modeDetail=`<div class="vrp-mode-box" style="background:${mc.boxBg};border-color:${mc.boxB}"><div class="vrp-mode-box-lbl" style="color:${mc.t}">Expressed through</div><div class="dep-units">${depChips(ctx.expressedThrough,units)}</div>${fieldRow('Mechanism',ctx.relationalMechanism,false,false)}${ctx.emergenceExplanation?`<div class="field-row"><span class="field-lbl">Emergence</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(ctx.emergenceExplanation)}</span></div>`:''}</div>`;}
  else if(mode==='both'){const ind=md.independent||{};const ctx=md.contextual||{};modeDetail=`<div class="vrp-mode-box" style="background:${mc.boxBg};border-color:${mc.boxB}"><div class="vrp-mode-box-lbl" style="color:${mc.t}">Independent component</div>${ind.visualConcept?`<div class="field-val" dir="${rtl?'rtl':'ltr'}" style="margin-bottom:4px">${esc(ind.visualConcept)}</div>`:''}<hr style="border:none;border-top:1px dashed ${mc.boxB};margin:6px 0"><div class="vrp-mode-box-lbl" style="color:${mc.t}">Contextual component</div><div class="dep-units">${depChips(ctx.expressedThrough,units)}</div>${ctx.relationalMechanism?`<div class="field-row" style="margin-top:4px"><span class="field-lbl">Mechanism</span><span class="field-val">${esc(ctx.relationalMechanism)}</span></div>`:''}${ctx.emergenceExplanation?`<div class="field-row"><span class="field-lbl">Emergence</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(ctx.emergenceExplanation)}</span></div>`:''}</div>`;}
  else if(mode==='gap'&&md.gap){const g=md.gap;modeDetail=`<div class="vrp-mode-box" style="background:${mc.boxBg};border-color:${mc.boxB}"><div class="vrp-mode-box-lbl" style="color:${mc.t}">Gap type</div><div class="field-val" style="margin-bottom:4px">${esc(g.gapType)}</div>${g.gapRationale?`<div class="field-row"><span class="field-lbl">Rationale</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(g.gapRationale)}</span></div>`:''}${g.alternativeStrategy?`<div class="field-row"><span class="field-lbl">Alternative</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(g.alternativeStrategy)}</span></div>`:''}</div>`;}

  return `<div class="vrp-phase"><div class="vrp-phase-lbl">Phase 2 - Representation mode determination</div>${step1}${step2}${step3}</div>`;

function buildPhase3HTML(v,rtl){

  else if(mode==='contextual'){content=`<div class="surv-row"><span class="conf-dot" style="background:${CONF_COLOR[p3.contextualConfidence]||'#B4B2A9'}"></span><span class="field-val">${esc(p3.survivabilityStatus)}</span>${confBadge(p3.contextualConfidence)}</div>`;}

function renderVrp(vrpResult){
  currentVrpResult=vrpResult;

  const units=currentResult?.representativeWords||[];
  const sum=vrpResult.vrpSummary||{};
  const vc=VIAB_CFG[sum.sequenceViability]||VIAB_CFG.partial;
  const chips=['independent','contextual','both','gap'].filter(m=>(sum[m]||0)>0).map(m=>{const mc=MODE_CFG[m];return `<div class="vrp-chip" style="background:${mc.bg};border-color:${mc.b};color:${mc.t}"><span class="vrp-dot" style="background:${mc.dot}"></span>${sum[m]} ${capitalize(m)}</div>`;}).join('');
  const viabChip=`<div class="vrp-chip" style="background:${vc.bg};border-color:${vc.b};color:${vc.t}">${capitalize(sum.sequenceViability||'unknown')}</div>`;
  const ensemble=vrpResult.ensembleReasoning?`<div class="card vrp-ensemble"><div class="vrp-ensemble-lbl">Ensemble reasoning</div><div class="vrp-ensemble-text" dir="${rtl?'rtl':'ltr'}">${esc(vrpResult.ensembleReasoning)}</div></div>`:'';
  const cards=(vrpResult.vrp||[]).map(v=>{
    const mode=v.phase2?.modeDecision?.mode||'gap';const mc=MODE_CFG[mode]||MODE_CFG.gap;
    const srcType=units.find(u=>u.id===v.unitId)?.category;
    const p1feats=(v.phase1?.identityFeatures||[]).map(f=>`<li class="feat-item"><span class="must-dot"></span><span class="must-text">${esc(f)}</span></li>`).join('');
    const p1=`<div class="vrp-phase"><div class="vrp-phase-lbl">Phase 1 - Semantic nature</div><div style="display:flex;flex-direction:column;gap:7px">${fieldRow('Entity nature',v.phase1?.entityNature,false,false)}${p1feats?`<div class="field-row"><span class="field-lbl">Identity features</span><ul class="feat-list">${p1feats}</ul></div>`:''}${v.phase1?.inherentlyVisual!=null?fieldRow('Inherently visual',v.phase1.inherentlyVisual?'Yes':'No',false,false):''}</div></div>`;
    const p2=buildPhase2HTML(v,rtl,units);
    const p3=buildPhase3HTML(v,rtl);
    const hc=H002_CFG[v.phase4?.h002Status]||H002_CFG.compliant;
    const p4=v.phase4?`<div class="vrp-phase"><div class="vrp-phase-lbl">Phase 4 - Expressive audit (H-002)</div>${badge(v.phase4.h002Status,hc.bg,hc.b,hc.t)}${v.phase4.auditNote&&v.phase4.auditNote!=='none'?`<div class="field-row" style="margin-top:8px"><span class="field-lbl">Note</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(v.phase4.auditNote)}</span></div>`:''}</div>`:'';
    return `<div class="vrp-card" style="border-left:3px solid ${mc.dot}"><button class="vrp-card-hdr" data-vrpid="${esc(v.unitId)}"><span class="trace-dot" style="background:${mc.dot}"></span><span class="vrp-card-name" dir="${rtl?'rtl':'ltr'}">${esc(v.unit)}</span>${modeBadge(mode)}${srcType?typeBadge(srcType):''}<span class="chevron" id="vrp-chev-${esc(v.unitId)}">&#9662;</span></button><div class="vrp-card-body" id="vrp-det-${esc(v.unitId)}" hidden>${p1}${p2}${p3}${p4}</div></div>`;
  }).join('');
  const viabBanner=sum.sequenceComment?`<div class="viability-banner" style="background:${vc.bg};border-color:${vc.b}"><div class="viability-lbl" style="color:${vc.t}">Sequence viability - ${capitalize(sum.sequenceViability||'')}</div><div class="viability-txt" style="color:${vc.t}" dir="${rtl?'rtl':'ltr'}">${esc(sum.sequenceComment)}</div></div>`:'';
  const vrpInner=document.getElementById('vrp-inner');
  if(vrpInner)vrpInner.innerHTML=`${sectionLabel('Visual Representation Plan',`${(vrpResult.vrp||[]).length} units`)}<div class="vrp-summary-bar">${chips}${viabChip}</div>${ensemble}<div class="vrp-cards">${cards}</div>${viabBanner}`;
  // Insert ARA trigger zone after vrp-trigger-zone

    araZone.id='ara-trigger-zone';
    araZone.style.cssText='margin-top:36px;padding-top:32px;border-top:1px solid var(--b3)';

    vrpZone?.parentNode?.insertBefore(araZone,vrpZone.nextSibling);
  }
  araZone.innerHTML=`<div id="ara-inner">${sectionLabel('Action Representation Analysis')}<button class="generate-vrp-btn" id="generate-ara-btn">Analyze action representation →</button></div>`;
  document.getElementById('generate-ara-btn')?.addEventListener('click',generateAra);

  renderCatalogSection(vrpResult);
}

  const contextCard=`<div class="ara-context">

    <div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap">
      ${(ctx.actionRSUIds||[]).length?badge(`${ctx.actionRSUIds.length} action RSU${ctx.actionRSUIds.length>1?'s':''}`, '#FAECE7','#F0997B','#4A1B0C'):''}
      ${(ctx.nonActionRSUIds||[]).length?badge(`${ctx.nonActionRSUIds.length} non-action RSU${ctx.nonActionRSUIds.length>1?'s':''}`, '#F1EFE8','#B4B2A9','#2C2C2A'):''}

    const ad=a.actionDisappearance||{};

    const osCol=`<div class="ara-strategy-col">
