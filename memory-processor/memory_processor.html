      ${os.proposedObjectRationale&&os.objectAvailable?`<div class="field-row"><span class="field-lbl">Rationale</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(os.proposedObjectRationale)}</span></div>`:''}
      ${os.h002Tension?`<div>${badge('H-002 tension','#FAEEDA','#EF9F27','#412402')}${os.h002Note?`<div class="h002-flag">${esc(os.h002Note)}</div>`:''}</div>`:''}
      ${os.proposedSequence?`<div class="ara-seq" dir="${rtl?'rtl':'ltr'}">${esc(os.proposedSequence)}</div>`:''}
      ${os.preserves?`<div class="field-row"><span class="field-lbl">Preserves</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(os.preserves)}</span></div>`:''}
      ${os.loses?`<div class="field-row"><span class="field-lbl">Loses</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(os.loses)}</span></div>`:''}
      ${os.ambiguity&&os.ambiguityNote?`<div class="field-row"><span class="field-lbl">Ambiguity</span><span class="field-val" style="color:#D85A30">${esc(os.ambiguityNote)}</span></div>`:''}
      ${os.alternativeReading?`<div class="field-row"><span class="field-lbl">Alt. reading</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(os.alternativeReading)}</span></div>`:''}
      <div class="ara-pres-row">${badge(osPres.label,osPres.bg,osPres.b,osPres.t)}${os.remainsCandidate!==undefined?badge(os.remainsCandidate?'Candidate':'Not candidate',os.remainsCandidate?'#E1F5EE':'#F1EFE8',os.remainsCandidate?'#5DCAA5':'#B4B2A9',os.remainsCandidate?'#04342C':'#2C2C2A'):''}</div>
      ${os.preservationNote?`<div class="ara-pres-note">${esc(os.preservationNote)}</div>`:''}
    </div>`;

    const adCol=`<div class="ara-strategy-col">
      <div class="ara-strategy-lbl">Action disappearance</div>
      ${ad.proposedSequence?`<div class="ara-seq" dir="${rtl?'rtl':'ltr'}">${esc(ad.proposedSequence)}</div>`:''}
      ${ad.preserves?`<div class="field-row"><span class="field-lbl">Preserves</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(ad.preserves)}</span></div>`:''}
      ${ad.loses?`<div class="field-row"><span class="field-lbl">Loses</span><span class="field-val" dir="${rtl?'rtl':'ltr'}">${esc(ad.loses)}</span></div>`:''}

  const seqFinding=araResult.sequenceLevelFinding?`<div class="ara-seq-finding"><div class="vrp-ensemble-lbl">Sequence-level finding</div><div class="vrp-ensemble-text" dir="${rtl?'rtl':'ltr'}">${esc(araResult.sequenceLevelFinding)}</div></div>`:'';

  if(araInner)araInner.innerHTML=`${sectionLabel('Action Representation Analysis',`${actionCount} action RSU${actionCount!==1?'s':''}`)}<div class="vrp-cards">${contextCard}${cards}</div>${seqFinding}${openQs}`;
}

async function generateAra(){
  if(!currentVrpResult)return;
  const araInner=document.getElementById('ara-inner');if(!araInner)return;
  araInner.innerHTML=`<div class="vrp-loading"><span class="vrp-dark-spinner"></span><span class="vrp-loading-txt">Analyzing action representation strategies...</span></div>`;
  let lastRaw='';
  try{
    const ctx={
      memoryLanguage:currentResult.memoryLanguage,
      coreNarrative:currentResult.coreNarrative,
      mustPreserve:currentResult.semanticStructure?.mustPreserve,
      representativeWords:currentResult.representativeWords,
      vrpUnits:(currentVrpResult.vrp||[]).map(v=>({
        unitId:v.unitId,unit:v.unit,canonicalReferent:v.canonicalReferent,
        entityNature:v.phase1?.entityNature,identityFeatures:v.phase1?.identityFeatures,
        vrpMode:v.phase2?.modeDecision?.mode
      }))
    };
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:8000,system:'You output only valid JSON. No markdown. No code fences. No explanation. No preamble. Your entire response must be parseable by JSON.parse().',messages:[{role:'user',content:ARA_PROMPT+'\n\n---\n\nInput:\n\n'+JSON.stringify(ctx,null,2)}]})});
    if(!res.ok){const body=await res.text().catch(()=>'');throw new Error('api_'+res.status+(body?': '+body.slice(0,120):''));}
    const data=await res.json();
    lastRaw=data.content.filter(c=>c.type==='text').map(c=>c.text).join('');
    if(data.stop_reason==='max_tokens')console.warn('[ARA] Response hit max_tokens limit');
    renderAra(extractJSON(lastRaw));
  }catch(e){
    let msg;
    if(e.message.startsWith('api_'))msg=`API error: ${e.message.replace('api_','')}`;
    else if(e instanceof SyntaxError||e.message.includes('JSON')||e.message.includes('object found')){const snippet=lastRaw?lastRaw.slice(0,140).replace(/\n/g,' '):'(empty)';msg=`ARA format error — response starts: "${snippet}..."`;}
    else msg='ARA generation failed. Check your connection.';
    if(araInner){araInner.innerHTML=`${sectionLabel('Action Representation Analysis')}<div class="error-card" style="margin-bottom:16px;word-break:break-all">${esc(msg)}</div><button class="generate-vrp-btn" id="generate-ara-btn">Retry \u2192</button>`;document.getElementById('generate-ara-btn')?.addEventListener('click',generateAra);}
  }
}

  if(araHdr){const aid=araHdr.dataset.araid;const det=document.getElementById('ara-det-'+aid);const chev=document.getElementById('ara-chev-'+aid);if(det){const open=!det.hidden;det.hidden=open;chev?.classList.toggle('open',!open);}return;}
  const filterTab=e.target.closest('.filter-tab');
  if(filterTab&&currentResult){currentFilter=filterTab.dataset.filter;const cr=currentResult.considerationRecord||[];const rw=currentResult.representativeWords||[];renderConsiderationRows(cr,rw,currentResult.memoryLanguage==='Hebrew');return;}
});

/* ─── Pre-fill mock memory ─── */
(()=>{
  const ta=document.getElementById('memory-input');
  ta.value=MOCK_MEMORY;ta.dir='rtl';
  updateWordCount();
})();
</script>
