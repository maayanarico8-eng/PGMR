  <title>pictogram-loader-horizontal-clean</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

      display: grid;
      place-items: center;
    }

    .loader {
      position: relative;
      width: 192px;
      height: 192px;
    }

    .strip {
      position: absolute;
      left: 0;
      width: 192px;
      height: 48px;
      overflow: hidden;
    }

    .strip:nth-child(2) { top: 48px; }
    .strip:nth-child(3) { top: 96px; }
    .strip:nth-child(4) { top: 144px; }

    .icon {
      position: absolute;
      left: 0;
      width: 192px;
      height: 192px;
    }

    .strip:nth-child(2) .icon { top: -48px; }
    .strip:nth-child(3) .icon { top: -96px; }
    .strip:nth-child(4) .icon { top: -144px; }

    .icon svg {
      display: block;
      width: 192px;
      height: 192px;
      overflow: visible;
    }
  </style>

37.3.68.68.68h20.2c.37,0,.68-.3.68-.68v-6.29c0-.83,0,5.63,0,5.63v-6.29c0-.37-.3-.68-.68-.68Z\"/></svg>"}];
    const strips = [...document.querySelectorAll(".strip .icon")];

    // זמן בין החלפות של רצועה בודדת.
    const ACTION_MS = 500;

    // השהייה קצרה בלבד על פיקטוגרמה שלמה.
    const COMPLETE_MS = 300;

    let currentIndex = 0;
    let targetIndex = 1;
    let stripValues = [0, 0, 0, 0];
    let actionQueue = [];
    let timer = null;
    let running = false;

    function shuffle(values) {
      const result = [...values];

      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }

      return result;
    }

    function renderStrip(stripIndex, iconIndex) {
      strips[stripIndex].innerHTML = pictograms[iconIndex].svg;
      stripValues[stripIndex] = iconIndex;
    }

    function renderAll(iconIndex) {
      for (let stripIndex = 0; stripIndex < 4; stripIndex++) {
        renderStrip(stripIndex, iconIndex);
      }

      showStatus();
    }

    function showStatus() {}

    function chooseDifferent(exclusions = []) {
      const options = pictograms
        .map((_, index) => index)
        .filter(index => !exclusions.includes(index));

      return options[Math.floor(Math.random() * options.length)];
    }

    function createBridgeAction(unlockedStrips) {
      if (unlockedStrips.length === 0) return null;

      const stripIndex =
        unlockedStrips[Math.floor(Math.random() * unlockedStrips.length)];

      const exclusions = [
        targetIndex,
        stripValues[stripIndex]
      ];

      if (stripIndex > 0) {
        exclusions.push(stripValues[stripIndex - 1]);
      }

      return {
        type: "bridge",
        stripIndex,
        iconIndex: chooseDifferent(exclusions)
      };
    }

    function buildTransitionQueue() {
      targetIndex = chooseDifferent([currentIndex]);

      const lockOrder = shuffle([0, 1, 2, 3]);
      const locked = new Set();
      const queue = [];

      lockOrder.forEach((stripIndex, lockPosition) => {
        const unlocked = [0, 1, 2, 3].filter(index => !locked.has(index));

        // לפני רוב הנעילות נכנסת החלפת ביניים אחת,
        // אך לעולם לא משתנות שתי רצועות באותה פעימה.
        const shouldAddBridge =
          lockPosition < 3 &&
          Math.random() < 0.8;

        if (shouldAddBridge) {
          const bridge = createBridgeAction(unlocked);

          if (bridge) {
            queue.push(bridge);
          }
        }

        queue.push({
          type: "lock",
          stripIndex,
          iconIndex: targetIndex
        });

        locked.add(stripIndex);
      });

      actionQueue = queue;
    }

    function performNextAction() {
      if (!running) return;

      if (actionQueue.length === 0) {
        currentIndex = targetIndex;
        showStatus();

        window.clearTimeout(timer);
        timer = window.setTimeout(() => {
          buildTransitionQueue();
          performNextAction();
        }, COMPLETE_MS);

        return;
      }

      const action = actionQueue.shift();

      // פעולה אחת בלבד: רצועה אחת בלבד משתנה.
      renderStrip(action.stripIndex, action.iconIndex);
      showStatus();

      window.clearTimeout(timer);
      timer = window.setTimeout(performNextAction, ACTION_MS);
    }

    function play() {
      if (running) return;

      running = true;

      if (actionQueue.length === 0) {
        buildTransitionQueue();
      }

      window.clearTimeout(timer);
      timer = window.setTimeout(performNextAction, COMPLETE_MS);
    }

    function pause() {
      running = false;
      window.clearTimeout(timer);
      timer = null;
    }


    renderAll(currentIndex);
    buildTransitionQueue();
    play();
  </script>
